---
###############################################################################
# Start
###############################################################################
# Deploy mox service here to cover install/config only flags. Start Mox
# services if configuration deployed and confirm active and running.

- name: '{{ "Start | filesystem | set " ~ mox__cfg._service }}'
  ansible.builtin.template:
    src: 'systemd/mox.service.j2'
    dest: '{{ mox__cfg._service }}'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: 'Start | systemd | mox'
  when: mox_flg_config
  block:
    - name: 'Start | systemd | mox'
      ansible.builtin.systemd:
        name: 'mox.service'
        state: 'restarted'
        enabled: true
        daemon_reload: true
      delay: 15
      retries: 3
      register: mox__service
      until: mox__service.status.ActiveState == 'active'

    - name: 'Start | fact | query services'
      ansible.builtin.service_facts:

    - name: 'Start | assert | services running'
      ansible.builtin.assert:
        quiet: true
        that: ansible_facts.services[item].state == 'running'
        fail_msg: |

          ✘ Service failed to start.
          {{ item }}
      loop:
        - 'mox.service'

- name: 'Validate | 🛈 MANUAL CONFIGURATION REQUIRED 🛈'
  when: not mox_flg_config
  ansible.builtin.debug:
    msg: |

      🛈 Mox configuration required. Service NOT started.

      Configure:
        su - {{ mox__srv._user }} -s /bin/bash
        cd {{ mox__cfg._var_d }}
        mox --help
        mox quickstart user@example.com

        systemctl start mox.service
