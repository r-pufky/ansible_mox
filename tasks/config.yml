---
###############################################################################
# Configure Services
###############################################################################
# Filetree returns a dict (instead of a list of dict) for one element. Use
# query to guarantee a list result.

- name: '{{ "Config | filesystem | set " ~ mox___app._config_d }}'
  when: mox__cfg._d | length > 0
  block:
    - name: 'Config | filetree | set managed directories'
      ansible.builtin.file:
        path: '{{ mox___app._config_d ~ "/" ~ item.path }}'
        owner: '{{ mox__srv._user }}'
        group: '{{ mox__srv._group }}'
        mode: '0750'
        state: 'directory'
      loop: '{{ query("community.general.filetree", mox__cfg._d) }}'
      loop_control:
        label: '{{ item.path }}'
      when: item.state == 'directory'

    - name: 'Config | filetree | set managed files'
      ansible.builtin.template:
        src: '{{ item.src }}'
        dest: '{{ mox___app._config_d ~ "/" ~ item.path }}'
        owner: '{{ mox__srv._user }}'
        group: '{{ mox__srv._group }}'
        mode: '0640'
      loop: '{{ query("community.general.filetree", mox__cfg._d) }}'
      loop_control:
        label: '{{ item.path }}'
      when: item.state == 'file'

    - name: 'Config | filesystem | query remote files'
      ansible.builtin.find:
        paths: '{{ mox___app._config_d }}'
        file_type: 'any'
        hidden: true
        recurse: true
      register: mox__remote

    - name: 'Config | filetree | remove unmanaged files and directories'
      ansible.builtin.file:
        path: '{{ item.path }}'
        state: 'absent'
      loop: '{{ mox__remote.files | sort(attribute="path", reverse=true) }}'
      loop_control:
        label: '{{ item.path }}'
      when: >
        item.path not in
        (
          query("community.general.filetree", mox__cfg._d) |
          map(attribute='path') |
          map('regex_replace', '^', mox___app._config_d ~ "/") | list
        )

- name: '{{ "Config | filesystem | query " ~ mox___app._config_d }}'
  when: mox__cfg._d | length == 0
  ansible.builtin.find:
    paths: "{{ mox___app._config_d }}"
    recurse: false  # Don't need to enumerate sub-directories to remove.
    hidden: true
  register: mox__cmd

- name: '{{ "Config | filesystem | clear " ~ mox___app._config_d }}'
  when: mox__cfg._d | length == 0
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ mox__cmd.files }}"
