---
###############################################################################
# Default Mox Package Dependencies
###############################################################################
# Default required packages for Mox install.
#
# Updates:
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://www.xmox.nl
# * github.com/mjl-/mox

mox___release: "{{ {} | r_pufky.data.v3(

    _date='2026-04-04',
    _debian='trixie',
    _app='v0.0.15',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

mox___packages:
  - 'ca-certificates'
  - 'golang'

###############################################################################
# Mox
###############################################################################
# Mox is built and installed via golang.

mox___app: "{{ {} | r_pufky.data.v3(

    _version=mox___release._app,
    _bin='/usr/local/bin/mox',
    _service='/etc/systemd/system/mox.service',
    _opt_d='/opt/mox',

    _src_d='/opt/mox/src',
    _app='/opt/mox/src/' ~ mox___release._app ~ '/mox',

    _var_d='/var/opt/mox',
    _data_d='/var/opt/mox/data',
    _config_d='/var/opt/mox/config',
    _web_d='/var/opt/mox/web',
    _url_base='github.com/mjl-/mox@',
  ) }}"

###############################################################################
# Default Mox User/Group
###############################################################################

mox___group:
  name: 'mox'
  gid: 550

mox___user:
  name: 'mox'
  group: 'mox'
  uid: 550
  shell: '/usr/sbin/nologin'
  home: '/var/opt/mox'
  comment: 'mox mailserver,,,'
  create_home: true
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
