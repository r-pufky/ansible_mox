---
###############################################################################
# Feature Flags
###############################################################################

# 1. Fatal version mismatch?
#
# Halt role execution immediately if the requested mox_srv_version does not the
# internal tested role version. This is meant to act as a safety check for
# major Mox version upgrades, which typically require manual intervention.
#
# Default: true.
#
# Reference:
# * https://github.com/mjl-/mox/releases
mox_flg_fatal: true

# 2. Install application?
#
# Creates required default directories, users, install packages, download and
# build software, autogenerates config if not specified, update and start
# services.
#
# Default: True.
#
mox_flg_install: true

# 3. Set configuration data?
#
# Overwrite config data directory sourced from mox_cfg_*. Stops service,
# deploys user config data, updates and starts services. Disable to install
# Mox and manually run interactive quick setup:
#
#  su - mox -s /bin/bash
#  cd /var/opt/mox
#  mox --help
#  mox quickstart user@example.com
#
# Default: False.
mox_flg_config: false

###############################################################################
# Service
###############################################################################

# Mox Release.
#
# Mox upgrades generally require manual upgrade steps listed in release notes.
#
# Versions (Schematic):
#       MAJOR: Safe - Usually requires no role updates.
#       MINOR: Safe - Usually requires no role updates.
#       PATCH: Safe - Usually requires no role updates.
#   RECOMMEND: Always check release notes when upgrading versions - most
#              version changes require manual migration of data store.
#
# Default: 'v0.0.15'.
#
# Reference:
# * https://github.com/mjl-/mox/releases
mox_srv_version: 'v0.0.15'

# User that Mox will run under.
#
# 'mox' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence. Manage running server with
# 'su - mox -s /bin/bash'.
#
# Default: 'mox'.
mox_srv_user: 'mox'

# Group that Mox will run under.
#
# 'mox' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'mox'.
mox_srv_group: 'mox'

###############################################################################
# Config
###############################################################################

# Mox configuration to set.
#
# Ansible controller path to source directory (treated as a jinja2 templates
# allowing for ansible variable use).
#
# Sets /var/opt/mox/config/*. Files not sourced will be removed. Setting no
# configuration allows for manual step-by-step Mox setup.
#
# maria_flg_config=true:
# ⋮maria_srv_conf_d='' - Remove existing files.
# ⋮maria_srv_conf_d='{DIR}' - Replace existing files with sourced template
# ⋮    dir.
# maria_flg_config=false:
# ⋮maria_srv_conf_d=* - Take no action.
#
# Special Case:
# * Permissions automatically set to 0750:0640 mox:mox.
# * Mox restricted to read/write on /var/opt/mox.
#
# mox_cfg_d: 'host_vars/mox.example.com/config'
#
# Default: '' (no configuration).
mox_cfg_d: ''
